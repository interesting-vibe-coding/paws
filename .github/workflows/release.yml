name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.5.0)'
        required: true
        default: 'v0.5.0'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-aarch64-apple-darwin-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package binary
        run: |
          cp target/aarch64-apple-darwin/release/paws paws-aarch64-apple-darwin
          chmod +x paws-aarch64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: paws-aarch64-apple-darwin
          path: paws-aarch64-apple-darwin

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          # Extract the section between this version header and the next
          BODY=$(awk "/^## \\[${TAG}\\]/,/^## \\[v/" CHANGELOG.md \
            | grep -v "^## \\[v" | sed '/^$/d' | head -40)
          if [ -z "$BODY" ]; then
            BODY="See [CHANGELOG.md](https://github.com/interesting-vibe-coding/paws/blob/main/CHANGELOG.md) for details."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/**/*
          draft: false
          prerelease: false
